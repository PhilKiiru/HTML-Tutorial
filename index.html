<!DOCTYPE html>
<html>
    <head>
        <!--title element that appears on top of the browser -->
        <title>My first web page</title>
        <!-- we are going to write our css styles-->
         <!-- img {} we are going to reference our image element-->
        <style>
            img {
                width: 100px;
                border-radius: 50px;
                float: left;
                margin-right: 10px;
            }

            p.username{
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <!-- The image tag has no closing tag because it cannot have any child elements -->
        <!-- The src attribute specifies the path to the image file -->
        <!-- class="" is short for classification and is used to put an attribute inside a different class or category-->
        <img src="images/user-profile-icon.jpg" >
        <p class="username">@philkiiru</p>
        <p>I love to teach you HTML!</p>
    </body>
</html>
